<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absensi SMK Assyafiiyah</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green-dark: #0d3b1e;
      --green-mid: #145a2e;
      --green-main: #1e8045;
      --green-light: #2db560;
      --green-pale: #d4f0de;
      --green-glow: #3ddc84;
      --gold: #f4c842;
      --surface: #ffffff;
      --text: #0d3b1e;
      --text-muted: #4a7a5a;
      --radius: 16px;
      --shadow: 0 8px 32px rgba(13, 59, 30, 0.13);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #0d3b1e 0%, #1a5c30 40%, #0f4422 100%);
      min-height: 100vh;
      padding: 30px 16px 60px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(61,220,132,0.10) 0%, transparent 70%);
      top: -150px; right: -150px;
      border-radius: 50%; pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(244,200,66,0.07) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      border-radius: 50%; pointer-events: none;
    }
    .card {
      max-width: 640px; margin: 0 auto;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(61,220,132,0.12);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #0d3b1e 0%, #1e8045 100%);
      padding: 36px 36px 28px;
      position: relative; overflow: hidden;
    }
    .header::after {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
    .logo-row { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; position: relative; z-index: 1; }
    .logo-circle {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--gold), #e8a800);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 16px rgba(244,200,66,0.4);
      flex-shrink: 0;
    }
    .school-name { color: #fff; }
    .school-name h2 { font-family: 'Playfair Display', serif; font-size: 1.45rem; line-height: 1.2; }
    .school-name p { font-size: 0.72rem; font-weight: 500; color: rgba(255,255,255,0.65); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }
    .header-title { position: relative; z-index: 1; color: #fff; }
    .header-title h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; }
    .header-title h1 em { font-style: normal; color: var(--gold); }
    .teacher-badge {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px; padding: 5px 14px;
      font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.9);
    }
    .form-body { padding: 32px 36px 36px; }
    @media(max-width:480px) { .form-body { padding: 24px 20px 28px; } }
    .form-group { margin-bottom: 22px; }
    label.field-label {
      display: block; font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--green-mid); margin-bottom: 8px;
    }
    label.field-label .req { color: #e05252; margin-left: 2px; }
    input[type="text"], input[type="date"], select {
      width: 100%; padding: 13px 16px;
      border: 2px solid #d8ede2; border-radius: var(--radius);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem; font-weight: 500;
      color: var(--text); background: #f6fdf8;
      transition: border-color .2s, box-shadow .2s, background .2s;
      outline: none; appearance: none; -webkit-appearance: none;
    }
    input:focus, select:focus {
      border-color: var(--green-main); background: #fff;
      box-shadow: 0 0 0 4px rgba(30,128,69,0.12);
    }
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾'; position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%); color: var(--green-main);
      font-size: 1rem; pointer-events: none;
    }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:480px) { .row-2 { grid-template-columns: 1fr; } }
    .status-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    @media(max-width:420px) { .status-grid { grid-template-columns: 1fr 1fr; } }
    .status-option { position: relative; }
    .status-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .status-label {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 12px 8px; border: 2px solid #d8ede2; border-radius: 14px;
      cursor: pointer; background: #f6fdf8; transition: all .2s; text-align: center;
    }
    .status-label .ico { font-size: 1.4rem; }
    .status-label .lbl { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .status-option input:checked + .status-label { border-color: var(--green-main); background: var(--green-pale); box-shadow: 0 0 0 3px rgba(30,128,69,0.12); }
    .status-option input:checked + .status-label .lbl { color: var(--green-dark); }
    #selfieSection { display: none; animation: fadeSlide .35s ease; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .notice {
      display: flex; align-items: flex-start; gap: 10px;
      background: #fff8e1; border-left: 4px solid var(--gold);
      border-radius: 10px; padding: 12px 14px;
      font-size: 0.82rem; color: #7a5800; font-weight: 500; margin-bottom: 18px;
    }
    .notice .ico { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .upload-box {
      border: 2px dashed #6dcc95; border-radius: var(--radius);
      background: linear-gradient(135deg, #f0faf4, #e6f7ec);
      padding: 28px 20px; text-align: center; cursor: pointer;
      position: relative; transition: border-color .2s, background .2s;
    }
    .upload-box:hover { border-color: var(--green-main); background: #e0f5e9; }
    .upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 2.8rem; margin-bottom: 10px; }
    .upload-box p { font-size: 0.9rem; font-weight: 600; color: var(--green-mid); }
    .upload-box p small { display: block; font-weight: 400; color: var(--text-muted); font-size: 0.76rem; margin-top: 4px; }
    #previewWrap { margin-top: 14px; display: none; position: relative; }
    #previewImg { width: 100%; max-height: 240px; object-fit: cover; border-radius: 12px; border: 3px solid var(--green-main); display: block; }
    .preview-info {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 8px; padding: 8px 12px;
      background: var(--green-pale); border-radius: 10px;
    }
    .preview-info span { font-size: 0.8rem; font-weight: 600; color: var(--green-mid); }
    #removeImg { background: #c0392b; color: #fff; border: none; border-radius: 8px; padding: 5px 12px; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
    #removeImg:hover { background: #a93226; }
    #uploadProgress { display: none; margin-top: 10px; background: #e8f5e9; border-radius: 10px; overflow: hidden; }
    #progressBar { height: 6px; width: 0%; background: linear-gradient(90deg, var(--green-main), var(--green-glow)); transition: width .3s ease; border-radius: 10px; }
    #progressLabel { text-align: center; font-size: 0.75rem; font-weight: 600; color: var(--green-mid); padding: 4px 0 6px; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, #c8e8d4, transparent); margin: 24px 0; }
    .btn-submit {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #1e8045, #2db560);
      color: #fff; border: none; border-radius: var(--radius);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem; font-weight: 800; cursor: pointer;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 6px 20px rgba(30,128,69,0.35);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 8px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(30,128,69,0.45); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { background: #a0c8b0; box-shadow: none; cursor: not-allowed; transform: none; }
    .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #0d3b1e; color: #fff;
      padding: 14px 28px; border-radius: 999px;
      font-size: 0.9rem; font-weight: 600;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; z-index: 9999; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.error { background: #8b2020; }
    #toast.warn { background: #7a5800; }
  </style>
</head>

<body>
  <div class="card">

    <div class="header">
      <div class="logo-row">
        <div class="logo-circle">🕌</div>
        <div class="school-name">
          <h2>SMK Assyafiiyah</h2>
          <p>Yayasan Pendidikan Islam</p>
        </div>
      </div>
      <div class="header-title">
        <h1>Daftar <em>Absensi</em></h1>
        <div class="teacher-badge">👨‍🏫 Guru: Riski Sistama</div>
      </div>
    </div>

    <div class="form-body">
      <form id="absenForm" novalidate>

        <div class="form-group">
          <label class="field-label" for="nama">Nama Lengkap <span class="req">*</span></label>
          <input type="text" id="nama" placeholder="Masukkan nama lengkap siswa…" required autocomplete="name" />
        </div>

        <div class="form-group">
          <label class="field-label" for="kelas">Kelas <span class="req">*</span></label>
          <div class="select-wrap">
            <select id="kelas" required>
              <option value="" disabled selected>— Pilih kelas —</option>
              <option value="X PPLG">X PPLG</option>
              <option value="X AKL">X AKL</option>
              <option value="XI RPL">XI RPL</option>
            </select>
          </div>
        </div>

        <div class="row-2">
          <div class="form-group">
            <label class="field-label" for="hari">Hari <span class="req">*</span></label>
            <div class="select-wrap">
              <select id="hari" required>
                <option value="" disabled selected>— Pilih —</option>
                <option>Senin</option><option>Selasa</option><option>Rabu</option>
                <option>Kamis</option><option>Jumat</option><option>Sabtu</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="field-label" for="tanggal">Tanggal <span class="req">*</span></label>
            <input type="date" id="tanggal" required />
          </div>
        </div>

        <div class="form-group">
          <label class="field-label">Status Kehadiran <span class="req">*</span></label>
          <div class="status-grid">
            <div class="status-option">
              <input type="radio" name="status" id="hadir" value="Hadir" required />
              <label class="status-label" for="hadir"><span class="ico">✅</span><span class="lbl">Hadir</span></label>
            </div>
            <div class="status-option">
              <input type="radio" name="status" id="izin" value="Izin" />
              <label class="status-label" for="izin"><span class="ico">📋</span><span class="lbl">Izin</span></label>
            </div>
            <div class="status-option">
              <input type="radio" name="status" id="sakit" value="Sakit" />
              <label class="status-label" for="sakit"><span class="ico">🏥</span><span class="lbl">Sakit</span></label>
            </div>
            <div class="status-option">
              <input type="radio" name="status" id="alpha" value="Alpha" />
              <label class="status-label" for="alpha"><span class="ico">❌</span><span class="lbl">Alpha</span></label>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- SELFIE SECTION khusus X PPLG -->
        <div id="selfieSection">
          <div class="notice">
            <span class="ico">📸</span>
            <span>Upload foto selfie <strong>wajib</strong> untuk siswa <strong>X PPLG</strong>. Foto akan tersimpan otomatis ke Google Sheets.</span>
          </div>

          <div class="form-group">
            <label class="field-label" for="selfie">Foto Selfie <span class="req">*</span></label>
            <div class="upload-box" id="uploadBox">
              <input type="file" id="selfie" accept="image/*" capture="user" />
              <div class="upload-icon">🤳</div>
              <p>Klik di sini atau foto langsung dari kamera
                <small>Format JPG / PNG / WEBP · Maksimal 5 MB</small>
              </p>
            </div>
            <div id="previewWrap">
              <img id="previewImg" src="" alt="Preview foto selfie" />
              <div class="preview-info">
                <span id="fileName">foto.jpg</span>
                <button type="button" id="removeImg">🗑 Hapus Foto</button>
              </div>
            </div>
            <div id="uploadProgress">
              <div id="progressBar"></div>
              <div id="progressLabel">Mengupload foto…</div>
            </div>
          </div>
          <div class="divider"></div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span id="btnText">📤 Kirim Absensi</span>
          <div class="spinner" id="btnSpinner"></div>
        </button>

      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ══════════════════════════════════════════════════════════
    // ⚙️ KONFIGURASI
    // ══════════════════════════════════════════════════════════

    // URL Google Apps Script (deploy sebagai Web App)
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzSOR-kCgPsqC2nCh0hBRmHlc9KnpApgnhyPTorEtDJO1L45h6lsB3UXBilb-Rlr6c7/exec';

    // API Key ImgBB — untuk upload foto
    const IMGBB_API_KEY = 'ea50a6b2a5c93a60c56e3605eb77ade2';

    // ══════════════════════════════════════════════════════════
  </script>

  <script>
    // ── Auto-isi hari & tanggal ──────────────────────────────
    const HARI_LIST = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const now = new Date();
    document.getElementById('tanggal').value = now.toISOString().split('T')[0];
    const hariSel = document.getElementById('hari');
    for (const opt of hariSel.options) {
      if (opt.value === HARI_LIST[now.getDay()]) { opt.selected = true; break; }
    }

    // ── Toggle selfie section ────────────────────────────────
    document.getElementById('kelas').addEventListener('change', function () {
      document.getElementById('selfieSection').style.display = this.value === 'X PPLG' ? 'block' : 'none';
      if (this.value !== 'X PPLG') clearSelfie();
    });

    // ── Preview foto ─────────────────────────────────────────
    document.getElementById('selfie').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        showToast('❌ Ukuran foto melebihi 5 MB', 'error');
        this.value = ''; return;
      }
      const reader = new FileReader();
      reader.onload = r => {
        document.getElementById('previewImg').src = r.target.result;
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('previewWrap').style.display = 'block';
        document.getElementById('uploadBox').style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('removeImg').addEventListener('click', clearSelfie);

    function clearSelfie() {
      document.getElementById('selfie').value = '';
      document.getElementById('previewWrap').style.display = 'none';
      document.getElementById('uploadBox').style.display = 'block';
      setProgress(0, '');
      document.getElementById('uploadProgress').style.display = 'none';
    }

    function setProgress(pct, label) {
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = label;
      document.getElementById('uploadProgress').style.display = pct > 0 ? 'block' : 'none';
    }

    function setLoading(on, msg = 'Mengirim…') {
      document.getElementById('submitBtn').disabled = on;
      document.getElementById('btnText').textContent = on ? msg : '📤 Kirim Absensi';
      document.getElementById('btnSpinner').style.display = on ? 'block' : 'none';
    }

    let toastTimer;
    function showToast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'show' + (type !== 'success' ? ' ' + type : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = ''; }, 4500);
    }

    function resetForm() {
      document.getElementById('absenForm').reset();
      clearSelfie();
      document.getElementById('selfieSection').style.display = 'none';
      const t = new Date();
      document.getElementById('tanggal').value = t.toISOString().split('T')[0];
      for (const opt of hariSel.options) {
        if (opt.value === HARI_LIST[t.getDay()]) { opt.selected = true; break; }
      }
    }

    // ── Upload foto ke ImgBB ─────────────────────────────────
    function uploadToImgBB(file) {
      return new Promise((resolve, reject) => {
        const formData = new FormData();
        formData.append('image', file);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.imgbb.com/1/upload?key=' + IMGBB_API_KEY, true);
        xhr.timeout = 60000;

        xhr.onload = function () {
          try {
            const res = JSON.parse(xhr.responseText);
            if (res.success) {
              resolve(res.data.url); // URL foto permanen
            } else {
              reject(new Error('ImgBB error: ' + (res.error?.message || 'Upload gagal')));
            }
          } catch (e) {
            reject(new Error('Respons ImgBB tidak valid'));
          }
        };
        xhr.onerror = () => reject(new Error('Gagal terhubung ke ImgBB. Periksa koneksi internet.'));
        xhr.ontimeout = () => reject(new Error('Upload foto timeout. Coba lagi.'));
        xhr.send(formData);
      });
    }

    // ── Kirim data ke Apps Script / Google Sheets ────────────
    function postToAppsScript(payload) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', APPS_SCRIPT_URL, true);
        xhr.setRequestHeader('Content-Type', 'text/plain;charset=utf-8');
        xhr.timeout = 60000;
        xhr.onload = function () {
          try {
            resolve(JSON.parse(xhr.responseText));
          } catch (e) {
            reject(new Error('Respons server tidak valid'));
          }
        };
        xhr.onerror = () => reject(new Error('Tidak dapat terhubung ke server.'));
        xhr.ontimeout = () => reject(new Error('Koneksi timeout. Coba lagi.'));
        xhr.send(JSON.stringify(payload));
      });
    }

    // ════════════════════════════════════════════════════════
    //  SUBMIT HANDLER
    // ════════════════════════════════════════════════════════
    document.getElementById('absenForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const nama    = document.getElementById('nama').value.trim();
      const kelas   = document.getElementById('kelas').value;
      const hari    = document.getElementById('hari').value;
      const tanggal = document.getElementById('tanggal').value;
      const status  = document.querySelector('input[name="status"]:checked')?.value;
      const selfie  = document.getElementById('selfie').files[0];

      if (!nama)    return showToast('⚠️ Nama wajib diisi', 'warn');
      if (!kelas)   return showToast('⚠️ Pilih kelas terlebih dahulu', 'warn');
      if (!hari)    return showToast('⚠️ Pilih hari terlebih dahulu', 'warn');
      if (!tanggal) return showToast('⚠️ Pilih tanggal terlebih dahulu', 'warn');
      if (!status)  return showToast('⚠️ Pilih status kehadiran', 'warn');
      if (kelas === 'X PPLG' && !selfie)
        return showToast('⚠️ Foto selfie wajib untuk kelas X PPLG', 'warn');

      setLoading(true, 'Memproses…');

      try {
        let photoUrl = '-';

        // ── STEP 1: Upload foto ke ImgBB (jika ada) ──
        if (selfie) {
          setLoading(true, 'Mengupload foto…');
          setProgress(30, 'Mengunggah ke ImgBB…');

          photoUrl = await uploadToImgBB(selfie);

          setProgress(100, '✅ Foto berhasil diunggah!');
        }

        // ── STEP 2: Simpan data ke Google Sheets via Apps Script ──
        setLoading(true, 'Menyimpan absensi…');

        const result = await postToAppsScript({
          action:    'addAbsensi',
          nama:      nama,
          kelas:     kelas,
          hari:      hari,
          tanggal:   tanggal,
          status:    status,
          photoUrl:  photoUrl,
          guru:      'Riski Sistama',
          timestamp: new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' })
        });

        if (result.status === 'success') {
          showToast('✅ Absensi berhasil dikirim!');
          setTimeout(() => {
            setProgress(0, '');
            document.getElementById('uploadProgress').style.display = 'none';
            resetForm();
          }, 800);
        } else {
          throw new Error(result.message || 'Gagal menyimpan data absensi');
        }

      } catch (err) {
        console.error('Submit error:', err);
        showToast('❌ ' + err.message, 'error');
      } finally {
        setLoading(false);
      }
    });
  </script>

</body>
</html>
